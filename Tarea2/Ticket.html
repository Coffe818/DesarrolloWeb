<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">

    <header>
      <h1>Ticket de Tuno</h1>
    </header>

    <form action="#">

      <div class="row">
        <div class="salto flex-2">
          <label class="" for="nombre_completo">Nombre completo de quien realizara el tramite: </label>
          <input class="" type="text" id="nombre_completo">
        </div>
        <div class="salto flex-1">
          <label class="" for="curp">curp: </label>
          <input class="" type="text" id="curp">
        </div>
      </div>

      <div class="row">
        <div class="salto flex-1">
          <label class="" for="nombre">nombre: </label>
          <input class="" type="text" id="nombre">
        </div>
        <div class="salto flex-1">
          <label class="" for="paterno">paterno: </label>
          <input class="" type="text" id="paterno">
        </div>

        <div class="salto flex-1">
          <label class="" for="materno">materno</label>
          <input class="" type="text" id="materno">
        </div>
      </div>

      <div class="row ">
        <div class="salto flex-1">
          <label class="" for="telefono">telefono</label>
          <input class="" type="text" id="telefono">
        </div>
        <div class="salto flex-1">
          <label class="" for="celular">celular</label>
          <input class="" type="text" id="celular">
        </div>
        <div class="salto flex-1">
          <label class="" for="correo">correo</label>
          <input class="" type="text" id="correo">
        </div>
      </div>


      <div class="salto">
        <label class="" for="nivel">¿Nivel al que desea ingresar o que ya cursa el alumno?</label>
        <select class="" id="nivel">
          <option> Seleccionar una opcion </option>
        </select>
      </div>
      <div class="salto">
        <label class="" for="municipio">Municipio donde desea que estudie el alumno:</label>
        <select class="" id="municipio">
          <option> Seleccionar una opcion </option>
        </select>
      </div>
      <div class="salto">
        <label class="" for="asunto">Seleccione el asunto que va a tratar:</label>
        <select class="" id="asunto">
          <option> Seleccionar una opcion </option>
        </select>
      </div>

      <div class="row center">
        <div class="salto">
          <button>Generar Turno </button>
        </div>
      </div>
    </form>

    <div class="row">
      <div class="salto flex-2">
        <ul>
          <li>
            Se requiere un mecanismo de autenticacion del documeto
          </li>
          <li>
            Se requiere indicar el numero de Turno
          </li>
          <li>
            Se requiere por oficina regional
          </li>
          <li>
            Se requiere parametrizar la antencion por dias
          </li>
          <li>
            Se requiere generar comprobante pdf
          </li>
          <li>
            Se requiere que la mayoria de usuario usan mobil
          </li>
        </ul>
      </div>

    </div>
  </main>
</body>

</html>
