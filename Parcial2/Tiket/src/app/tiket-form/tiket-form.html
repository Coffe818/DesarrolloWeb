<div class="container py-4">
  <!-- Botón Regresar y Título -->
  <div class="d-flex align-items-center mb-4">
    <button routerLink="/" class="btn btn-outline-secondary btn-sm d-flex align-items-center">
      <span class="material-icons">arrow_back</span>
    </button>
    <h2 class="flex-grow-1 text-center m-0">Gestión de Tickets</h2>
    <div style="width: 32px;"></div>
  </div>

  <!-- Selector de Acción: Tabs -->
  <ul class="nav nav-pills nav-justified mb-4 bg-white p-2 rounded shadow-sm">
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTab === 'nuevo'" (click)="setActiveTab('nuevo')">{{ navName
        }}</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTab === 'editar'" (click)="setActiveTab('editar')">Consultar /
        Editar</button>
    </li>
  </ul>

  <div class="tab-content">
    <!-- NUEVO TICKET -->
    <div class="tab-pane fade" [class.show]="activeTab === 'nuevo'" [class.active]="activeTab === 'nuevo'">
      <div class="card border-0 shadow-sm p-4">
        <h5 class="mb-3 text-primary">Nuevo Registro</h5>
        <p class="text-muted">Llená el formulario para obtener tu turno.</p>

        <form>
          <div class="mb-2">
            <label class="form-label">Nombre del que realiza</label>
            <input [(ngModel)]="ticket.nombre_realiza" name="nombre_realiza" type="text" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">CURP</label>
            <input [(ngModel)]="ticket.curp" name="curp" type="text" class="form-control" maxlength="18">
          </div>
          <div class="mb-2">
            <label class="form-label">Nombre</label>
            <input [(ngModel)]="ticket.nombre" name="nombre" type="text" class="form-control">
          </div>
          <div class="row">
            <div class="col-6 mb-2">
              <label class="form-label">Apellido Paterno</label>
              <input [(ngModel)]="ticket.apellido_paterno" name="apellido_paterno" type="text" class="form-control">
            </div>
            <div class="col-6 mb-2">
              <label class="form-label">Apellido Materno</label>
              <input [(ngModel)]="ticket.apellido_materno" name="apellido_materno" type="text" class="form-control">
            </div>
          </div>
          <div class="row">
            <div class="col-6 mb-2">
              <label class="form-label">Teléfono</label>
              <input [(ngModel)]="ticket.telefono" name="telefono" type="tel" class="form-control">
            </div>
            <div class="col-6 mb-2">
              <label class="form-label">Celular</label>
              <input [(ngModel)]="ticket.celular" name="celular" type="tel" class="form-control">
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label">Correo</label>
            <input [(ngModel)]="ticket.correo" name="correo" type="email" class="form-control">
          </div>
          <div class="row">
            <div class="col-6 mb-2">
              <label class="form-label">Nivel Estudios</label>
              <select [(ngModel)]="ticket.nivel_estudios" name="nivel_estudios" class="form-select">
                <option value="">Seleccione...</option>
                <option value="Primaria">Primaria</option>
                <option value="Secundaria">Secundaria</option>
                <option value="Bachillerato">Bachillerato</option>
                <option value="Licenciatura">Licenciatura</option>
              </select>
            </div>
            <div class="col-6 mb-2">
              <label class="form-label">Municipio</label>
              <select [(ngModel)]="ticket.municipio" name="municipio" class="form-select">
                <option value="">Seleccione...</option>
                <option value="Abasolo">Abasolo</option>
                <option value="Saltillo">Saltillo</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Asunto</label>
            <textarea [(ngModel)]="ticket.asunto" name="asunto" class="form-control" rows="3"></textarea>
          </div>
          <button type="button" (click)="guardarTicket()" class="btn btn-primary w-100 py-2 shadow-sm">Registrar
            Ticket</button>
        </form>
      </div>
    </div>

    <!-- CONSULTAR/EDITAR -->
    <div class="tab-pane fade" [class.show]="activeTab === 'editar'" [class.active]="activeTab === 'editar'">
      <div class="card border-0 shadow-sm p-4">
        <h5 class="mb-3 text-primary">Buscar mi ticket</h5>
        <div class="mb-3">
          <label class="form-label">CURP</label>
          <input [(ngModel)]="ticketBusqueda.curp" name="curp" type="text" class="form-control"
            placeholder="Ej. AAAA000000AAAAAA00" maxlength="18">
        </div>
        <div class="mb-4">
          <label class="form-label">Número de Turno</label>
          <input [(ngModel)]="ticketBusqueda.turno" name="turno" type="number" class="form-control"
            placeholder="Ej. 123">
        </div>
        <button type="button" (click)="consultarTicket()"
          class="btn btn-primary w-100 py-2 shadow-sm">Consultar</button>
      </div>
    </div>
  </div>
</div>
