<div class="container-fluid py-4">
  <app-page-header title="Dashboard"></app-page-header>

  <!-- Cards de Estadísticas -->
  <div class="row g-3 mb-4">
    <!-- Card Resueltos -->
    <div class="col-12 col-md-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body text-center py-4">
          <div class="icon-box bg-success bg-opacity-10 text-success mb-3">
            <span class="material-icons">check_circle</span>
          </div>
          <h2 class="mb-1 text-success">{{ totalResueltos() }}</h2>
          <p class="text-muted mb-0">Tickets Atendidos</p>
        </div>
      </div>
    </div>

    <!-- Card Pendientes -->
    <div class="col-12 col-md-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body text-center py-4">
          <div class="icon-box bg-warning bg-opacity-10 text-warning mb-3">
            <span class="material-icons">pending</span>
          </div>
          <h2 class="mb-1 text-warning">{{ totalPendientes() }}</h2>
          <p class="text-muted mb-0">Tickets Pendientes</p>
        </div>
      </div>
    </div>

    <!-- Card Total -->
    <div class="col-12 col-md-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body text-center py-4">
          <div class="icon-box bg-primary bg-opacity-10 text-primary mb-3">
            <span class="material-icons">assignment</span>
          </div>
          <h2 class="mb-1 text-primary">{{ totalGeneral() }}</h2>
          <p class="text-muted mb-0">Total de Tickets</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Gráfico de Pastel y Porcentajes -->
  <div class="row mb-4">
    <div class="col-12 col-lg-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body text-center d-flex flex-column justify-content-center align-items-center py-5">
          <div class="icon-box bg-success bg-opacity-10 text-success mb-3">
            <span class="material-icons">check_circle</span>
          </div>
          <h2 class="mb-1 text-success">{{ porcentajeResueltos() }}</h2>
          <p class="text-muted mb-0">Porcentaje Atendido</p>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body">
          <div class="chart-container pastel-chart">
            <canvas #pastelChart></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-4">
      <div class="card border-0 shadow-sm h-100">
        <div class="card-body text-center d-flex flex-column justify-content-center align-items-center py-5">
          <div class="icon-box bg-warning bg-opacity-10 text-warning mb-3">
            <span class="material-icons">pending</span>
          </div>
          <h2 class="mb-1 text-warning">{{ porcentajePendientes() }}</h2>
          <p class="text-muted mb-0">Porcentaje Pendiente</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Gráficos de Barras Verticales -->
  <div class="row g-3 mb-3">
    <!-- Resueltos por Municipio -->
    <div class="col-12 col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="chart-container bar-chart-vertical">
            <canvas #barResueltosChart></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Pendientes por Municipio -->
    <div class="col-12 col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="chart-container bar-chart-vertical">
            <canvas #barPendientesChart></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Gráfico Total Horizontal -->
  <div class="row">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="chart-container bar-chart-horizontal">
            <canvas #barTotalChart></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
